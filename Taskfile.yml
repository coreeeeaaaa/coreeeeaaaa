version: '3'

tasks:
  install:
    desc: 'Install all project dependencies'
    cmds:
      - npm install
      - cd packages/core && npm install
      - cd packages/sdk && npm install
      - cd packages/cli && npm install

  build:
    desc: 'Build all packages'
    deps: [install]
    cmds:
      - echo "Building all packages..."
      - npm run build

  lint:
    desc: 'Run linting checks'
    cmds:
      - echo "Running lint checks..."
      - npm run lint

  test:
    desc: 'Run all tests'
    cmds:
      - echo "Running tests..."
      - npm run test

  security:
    desc: 'Run security scans (trivy, gitleaks)'
    cmds:
      - echo "Running security scans..."
      - '[[ -x "$(command -v trivy)" ]] && trivy fs --exit-code 0 . || echo "⚠️  Trivy not found, skipping container scan"'
      - '[[ -x "$(command -v gitleaks)" ]] && gitleaks detect --no-git --verbose || echo "⚠️  Gitleaks not found, skipping secret scan"'

  quality:
    desc: 'Run comprehensive quality gate (lint + test + security)'
    deps: [build]
    cmds:
      - task: lint
      - task: test
      - task: security
      - echo "✅ Quality gate passed"

  dev:
    desc: 'Start local development server'
    cmds:
      - echo "Starting development server..."
      - npm run dev || npm start || echo "No dev/start script found in package.json"

  clean:
    desc: 'Clean build artifacts'
    cmds:
      - rm -rf packages/*/dist
      - rm -rf packages/*/node_modules
      - rm -rf node_modules
      - echo "✅ Cleaned build artifacts"